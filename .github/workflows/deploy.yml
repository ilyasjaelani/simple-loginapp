name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io          # Change to ghcr.io or your registry
  IMAGE_BACKEND: ${{ secrets.DOCKER_USERNAME }}/pro-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/pro-frontend

jobs:
  # ── Build & Push Docker Images ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Kubernetes ────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yml
          echo "KUBECONFIG=$(pwd)/kubeconfig.yml" >> $GITHUB_ENV

      - name: Update image tags in manifests
        run: |
          sed -i "s|yourregistry/pro-backend:latest|${{ env.IMAGE_BACKEND }}:${{ github.sha }}|g" k8s/04-backend.yaml
          sed -i "s|yourregistry/pro-frontend:latest|${{ env.IMAGE_FRONTEND }}:${{ github.sha }}|g" k8s/05-frontend.yaml

      - name: Apply manifests
        run: kubectl apply -f k8s/ --namespace pro

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/pro-backend -n pro --timeout=120s
          kubectl rollout status deployment/pro-frontend -n pro --timeout=120s
