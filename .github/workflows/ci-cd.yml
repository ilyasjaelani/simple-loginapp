name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/pro-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/pro-frontend
  GITOPS_REPO: ${{ github.repository_owner }}/pro-gitops  # sesuaikan nama repo gitops kamu

jobs:
  # ── CI: Build & Push ────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── CD: Update GitOps repo ──────────────────────────────────────────────────
  update-gitops:
    name: Update GitOps Manifest
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    # Hanya jalan saat push ke main (bukan PR)
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update backend image tag
        run: |
          TAG=${{ needs.build-backend.outputs.image_tag }}
          sed -i "s|image: ghcr.io/.*/pro-backend:.*|image: ${{ env.IMAGE_BACKEND }}:${TAG}|g" \
            gitops/apps/pro/backend.yaml
          echo "Backend image updated to tag: ${TAG}"

      - name: Update frontend image tag
        run: |
          TAG=${{ needs.build-frontend.outputs.image_tag }}
          sed -i "s|image: ghcr.io/.*/pro-frontend:.*|image: ${{ env.IMAGE_FRONTEND }}:${TAG}|g" \
            gitops/apps/pro/frontend.yaml
          echo "Frontend image updated to tag: ${TAG}"

      - name: Commit and push manifest changes
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/pro/backend.yaml apps/pro/frontend.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags from commit ${{ github.sha }}"
          git push